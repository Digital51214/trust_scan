name: social_saver
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  get: ^4.7.3
  lottie: ^3.3.2
  get_storage: ^2.1.1
  image_picker: ^1.2.1
  http: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

  # ✅ App icon generator
  flutter_launcher_icons: ^0.14.1

# ✅ App icon config
flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/App_Icon.png
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/images/
