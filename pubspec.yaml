name: social_saver
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"   # 👈 safer than ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.9
  get: ^4.7.3
  lottie: ^3.3.3
  get_storage: ^2.1.1
  image_picker: ^1.2.1
  http: ^1.2.2
  flutter_animate: ^4.5.0
  video_player: ^2.11.1
  gif: ^2.1.0
dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/App_Icon.png
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/vedio/vedio.mp4
    - assets/vedio/reversed_video.mp4
    - assets/vedio/settings.mp4
    - assets/vedio/vedio1.mp4
    - assets/vedio/reverseV1.mp4
  fonts:
    - family: "A"
      fonts:
        - asset: assets/fonts/Nunito-VariableFont_wght.ttf